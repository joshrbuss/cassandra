<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassandra — Position Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface-2: #242424; --surface-3: #2e2e2e;
    --border: #333; --text: #e8e8e8; --text-dim: #888;
    --accent: #c084fc; --accent-dim: #7c3aed;
    --green: #4ade80; --red: #f87171; --orange: #fb923c; --blue: #60a5fa;
    --light-square: #e8d5b5; --dark-square: #b58863;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
  .header {
    padding: 20px 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header h1 span { color: var(--accent); }
  .nav { display: flex; gap: 4px; }
  .nav a {
    padding: 8px 16px; border-radius: 6px; text-decoration: none;
    color: var(--text-dim); font-size: 13px; font-weight: 500;
  }
  .nav a:hover { background: var(--surface); color: var(--text); }
  .nav a.active { background: var(--accent-dim); color: white; }

  .main { display: grid; grid-template-columns: 1fr 400px; height: calc(100vh - 73px); }

  .center-panel {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 32px; background: var(--surface);
  }

  .board {
    display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
    width: min(480px, calc(100vh - 300px)); height: min(480px, calc(100vh - 300px));
    border-radius: 4px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .square {
    display: flex; align-items: center; justify-content: center;
    font-size: min(42px, calc((100vh - 300px) / 10)); user-select: none; position: relative; cursor: pointer;
  }
  .square.light { background: var(--light-square); }
  .square.dark { background: var(--dark-square); }
  .square.move-highlight { box-shadow: inset 0 0 0 3px var(--accent); }
  .square-label { position: absolute; font-size: 10px; font-weight: 600; opacity: 0.6; }
  .square-label.file { bottom: 2px; right: 4px; }
  .square-label.rank { top: 2px; left: 4px; }
  .light .square-label { color: var(--dark-square); }
  .dark .square-label { color: var(--light-square); }

  .move-prob {
    position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
    font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px;
    background: rgba(0,0,0,0.7); color: white;
  }

  .position-info {
    margin-top: 16px; text-align: center; font-size: 13px; color: var(--text-dim);
  }
  .position-info strong { color: var(--text); }

  .right-panel {
    border-left: 1px solid var(--border); overflow-y: auto; padding: 24px;
  }
  .section { margin-bottom: 24px; }
  .section h3 {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 10px;
  }

  .move-list { display: flex; flex-direction: column; gap: 6px; }
  .move-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--surface-2); border-radius: 6px; cursor: pointer;
    transition: all 0.15s;
  }
  .move-row:hover { background: var(--surface-3); }
  .move-san { font-size: 18px; font-weight: 700; width: 50px; }
  .move-bar-track { flex: 1; height: 8px; background: var(--surface-3); border-radius: 4px; overflow: hidden; }
  .move-bar-fill { height: 100%; border-radius: 4px; }
  .move-freq { font-size: 13px; font-weight: 600; width: 45px; text-align: right; }
  .move-count { font-size: 11px; color: var(--text-dim); width: 60px; text-align: right; }

  .elo-selector { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 16px; }
  .elo-btn {
    padding: 4px 10px; border: 1px solid var(--border); background: var(--surface-2);
    color: var(--text-dim); border-radius: 4px; font-size: 11px; cursor: pointer;
  }
  .elo-btn:hover { border-color: var(--accent); color: var(--text); }
  .elo-btn.active { background: var(--accent-dim); border-color: var(--accent); color: white; }

  .hub-list { display: flex; flex-direction: column; gap: 8px; }
  .hub-item {
    padding: 10px; background: var(--surface-2); border-radius: 6px;
    cursor: pointer; transition: all 0.15s;
  }
  .hub-item:hover { background: var(--surface-3); }
  .hub-item.active { border-left: 3px solid var(--accent); }
  .hub-title { font-size: 13px; font-weight: 600; }
  .hub-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .eco-tag {
    display: inline-block; font-size: 10px; padding: 1px 5px; margin: 1px;
    background: var(--surface-3); border-radius: 3px; color: var(--accent);
  }

  .insight-box {
    padding: 12px; background: rgba(192,132,252,0.08); border: 1px solid rgba(192,132,252,0.2);
    border-radius: 8px; font-size: 13px; line-height: 1.6;
  }
  .insight-box strong { color: var(--accent); }

  .empty-msg { text-align: center; padding: 40px; color: var(--text-dim); }
  .empty-msg code {
    display: block; margin-top: 12px; padding: 10px; background: var(--surface-2);
    border-radius: 6px; font-size: 12px; color: var(--green);
  }
  .upload-area {
    margin-top: 16px; padding: 16px; border: 2px dashed var(--border);
    border-radius: 8px; cursor: pointer;
  }
  .upload-area:hover { border-color: var(--accent); }
  .upload-area input { display: none; }
</style>
</head>
<body>
<div class="header">
  <h1><span>Cassandra</span> — Position Explorer</h1>
  <div class="nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="explorer.html" class="active">Explorer</a>
    <a href="puzzle-viewer.html">Puzzles</a>
  </div>
</div>

<div class="main">
  <div class="center-panel">
    <div class="board" id="board"></div>
    <div class="position-info" id="position-info">Load analysis data to explore positions</div>
  </div>

  <div class="right-panel" id="right-panel">
    <div class="empty-msg" id="empty-state">
      <h2>Load Analysis Data</h2>
      <p>Run the analysis script, then load the output:</p>
      <code>python3 scripts/analyze_database.py</code>
      <div class="upload-area" id="upload-area">
        <p>Drop analysis.json here</p>
        <input type="file" id="file-input" accept=".json">
      </div>
    </div>
  </div>
</div>

<script>
const PIECES = {
  'K':'♔','Q':'♕','R':'♖','B':'♗','N':'♘','P':'♙',
  'k':'♚','q':'♛','r':'♜','b':'♝','n':'♞','p':'♟'
};

let analysisData = null;
let currentPosition = null;

function parseFEN(fen) {
  const board = [];
  for (const row of fen.split(' ')[0].split('/')) {
    const r = [];
    for (const ch of row) {
      if (ch >= '1' && ch <= '8') for (let i = 0; i < parseInt(ch); i++) r.push(null);
      else r.push(ch);
    }
    board.push(r);
  }
  return board;
}

function renderBoard(fen, moveHighlights) {
  const boardEl = document.getElementById('board');
  const board = parseFEN(fen);
  const files = 'abcdefgh';
  boardEl.innerHTML = '';

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const sq = document.createElement('div');
      sq.className = 'square ' + ((r+c)%2===0 ? 'light' : 'dark');

      const sqName = files[c] + (8-r);
      if (moveHighlights && moveHighlights.includes(sqName)) {
        sq.classList.add('move-highlight');
      }

      if (r === 7) { const l = document.createElement('span'); l.className='square-label file'; l.textContent=files[c]; sq.appendChild(l); }
      if (c === 0) { const l = document.createElement('span'); l.className='square-label rank'; l.textContent=8-r; sq.appendChild(l); }

      if (board[r][c]) sq.textContent = PIECES[board[r][c]] || '';
      boardEl.appendChild(sq);
    }
  }
}

function selectPosition(pos) {
  currentPosition = pos;
  renderBoard(pos.fen);

  const info = document.getElementById('position-info');
  info.innerHTML = `<strong>${pos.total_visits.toLocaleString()}</strong> times seen · ` +
    `<strong>${pos.unique_games.toLocaleString()}</strong> games · ` +
    `avg move <strong>${pos.avg_move_number}</strong>`;

  // Render move distribution
  const panel = document.getElementById('right-panel');
  const maxCount = pos.top_moves[0]?.count || 1;

  const colors = ['var(--accent)', 'var(--blue)', 'var(--green)', 'var(--orange)', 'var(--red)'];

  let html = '';

  // Hub info if applicable
  if (pos.openings) {
    html += `<div class="section"><h3>Transposition Hub</h3>
      <div class="insight-box">This position is reached by <strong>${pos.openings} different openings</strong>
      across ${pos.games?.toLocaleString() || pos.total_visits.toLocaleString()} games.
      ${pos.opening_ecos ? '<br>' + pos.opening_ecos.map(e => `<span class="eco-tag">${e}</span>`).join(' ') : ''}
      </div></div>`;
  }

  // Move distribution
  html += '<div class="section"><h3>Move Distribution</h3><div class="move-list">';
  pos.top_moves.forEach((m, i) => {
    const pct = (m.freq * 100).toFixed(1);
    const barPct = (m.count / maxCount * 100).toFixed(0);
    html += `<div class="move-row">
      <span class="move-san" style="color:${colors[i%5]}">${m.san}</span>
      <div class="move-bar-track"><div class="move-bar-fill" style="width:${barPct}%;background:${colors[i%5]}"></div></div>
      <span class="move-freq">${pct}%</span>
      <span class="move-count">${m.count.toLocaleString()}</span>
    </div>`;
  });
  html += '</div></div>';

  // Position list
  html += '<div class="section"><h3>All Positions</h3><div class="hub-list">';
  const positions = getPositionList();
  positions.forEach((p, i) => {
    const isActive = p.position_hash === pos.position_hash;
    const topMove = p.top_moves[0] || {san:'?',freq:0};
    html += `<div class="hub-item ${isActive ? 'active' : ''}" onclick="selectPositionByIndex(${i})">
      <div class="hub-title">${p.total_visits.toLocaleString()} visits — Top: ${topMove.san} (${(topMove.freq*100).toFixed(0)}%)</div>
      <div class="hub-meta">Move ${p.avg_move_number} avg · ${p.unique_games} games
      ${p.opening_ecos ? ' · ' + p.opening_ecos.slice(0,3).map(e=>`<span class="eco-tag">${e}</span>`).join('') : ''}</div>
    </div>`;
  });
  html += '</div></div>';

  panel.innerHTML = html;
}

function getPositionList() {
  if (!analysisData) return [];
  // Merge pareto positions with hub data
  const positions = (analysisData.pareto_positions || []).map(p => ({...p}));

  // Add hub info
  if (analysisData.hubs) {
    const hubMap = {};
    for (const h of analysisData.hubs) hubMap[h.position_hash] = h;
    for (const p of positions) {
      if (hubMap[p.position_hash]) {
        p.openings = hubMap[p.position_hash].openings;
        p.opening_ecos = hubMap[p.position_hash].opening_ecos;
        p.games = hubMap[p.position_hash].games;
      }
    }
    // Add hubs not in pareto list
    for (const h of analysisData.hubs) {
      if (!positions.find(p => p.position_hash === h.position_hash)) {
        positions.push({
          ...h,
          total_visits: h.games,
          unique_games: h.games,
          avg_move_number: h.avg_move_number,
          top_moves: [],
        });
      }
    }
  }

  return positions;
}

function selectPositionByIndex(i) {
  const positions = getPositionList();
  if (positions[i]) selectPosition(positions[i]);
}

function loadData(data) {
  analysisData = data;
  const positions = getPositionList();
  if (positions.length > 0) {
    selectPosition(positions[0]);
  }
}

// File upload
const uploadArea = document.getElementById('upload-area');
const fileInput = document.getElementById('file-input');
if (uploadArea) {
  uploadArea.addEventListener('click', () => fileInput.click());
  uploadArea.addEventListener('dragover', e => e.preventDefault());
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) readFile(e.target.files[0]); });
}
function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => { try { loadData(JSON.parse(e.target.result)); } catch(err) { alert(err); } };
  reader.readAsText(file);
}

// Auto-load
async function tryAutoLoad() {
  for (const path of ['data/analysis.json', '../frontend/data/analysis.json']) {
    try { const r = await fetch(path); if (r.ok) { loadData(await r.json()); return; } } catch {}
  }
}
tryAutoLoad();

renderBoard('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
</script>
</body>
</html>
